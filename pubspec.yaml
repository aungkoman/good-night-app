name: goodnight
description: "Good Night — Buddhist Dhamma talks for a peaceful night."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  rxdart: ^0.27.7

dev_dependencies:
  flutter_launcher_icons: "^0.14.4"
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/dhamma_collection.json
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/good-night.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  remove_alpha_ios: true